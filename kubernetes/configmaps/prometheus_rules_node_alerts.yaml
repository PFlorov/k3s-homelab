apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules-node-alerts
  labels:
    app: prometheus
data:
  pvc-pending.yml: |
    groups:
      - name: pvc.rules
        rules:
          - alert: PVCPending
            expr: kube_persistentvolumeclaim_status_phase{phase="Pending"} == 1
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "PVC {{ $labels.persistentvolumeclaim }} is Pending"
              description: "Kubernetes PVC {{ $labels.persistentvolumeclaim }} is in state Pending for more than 5 minutes in {{ $labels.namespace }} namespace."

  node-down.yml: |
    groups:
      - name: node.rules
        rules:
          - alert: NodeNotReady
            expr: kube_node_status_condition{condition="Ready", status="true", node!~"localhost.localdomain"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.node }} is NotReady"
              description: "Kubernetes node {{ $labels.node }} has been NotReady for more than 5 minutes. This indicates a potential issue with the node."
