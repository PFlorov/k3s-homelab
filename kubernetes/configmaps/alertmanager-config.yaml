apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config-template
  namespace: monitoring
  labels:
    app: alertmanager
data:
  config.yml.tmpl: |
    global:
      resolve_timeout: 5m


    route:
      group_by: ['alertname', 'job']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h

      receiver: discord


    receivers:
      - name: discord
        discord_configs:
          - webhook_url: "__DISCORD_WEBHOOK_URL__"
